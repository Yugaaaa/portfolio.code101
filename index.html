<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CODE101 | Portfolio</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0a0a0a;
      --surface-color: #141414;
      --text-color: #ffffff;
      --accent-color: #ffffff;
      --secondary-action: #707070;
    }

    html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg-color); color: var(--text-color); }
    
    /* Responsive Cursor: Hide on touch devices */
    @media (pointer: fine) {
      body { cursor: none; }
      .custom-cursor {
        position: fixed; width: 20px; height: 20px; border-radius: 50%;
        border: 2px solid var(--text-color); pointer-events: none;
        z-index: 99999; transform: translate(-50%, -50%);
        transition: width 0.3s ease, height 0.3s ease;
        mix-blend-mode: difference;
      }
      .cursor-dot {
        position: fixed; width: 4px; height: 4px; background: var(--text-color);
        border-radius: 50%; pointer-events: none; z-index: 99999; transform: translate(-50%, -50%);
      }
    }
    @media (pointer: coarse) {
      .custom-cursor, .cursor-dot { display: none; }
      body { cursor: auto; overflow-y: auto; } /* Allow native scroll if snap fails on old mobile */
    }

    .section-container {
      height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .section-container::-webkit-scrollbar { display: none; }
    
    .section {
      min-height: 100vh; scroll-snap-align: start;
      position: relative; padding: 2rem 1rem;
      display: flex; align-items: center; justify-content: center;
    }

    /* Mobile-optimized Grid */
    .responsive-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 1100px;
    }

    .video-bg { position: absolute; inset: 0; z-index: -1; }
    .video-bg canvas { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }

    /* Hamburger & Nav */
    .hamburger { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 100; background: none; border: none; }
    .nav-overlay {
      position: fixed; inset: 0; background: var(--bg-color);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 90; gap: 2rem;
    }
    .nav-overlay.active { display: flex; }

    .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
  </style>
 </head>
 <body>
  <div class="custom-cursor" id="cursor"></div>
  <div class="cursor-dot" id="dot"></div>

  <button class="hamburger" id="menuBtn">
    <i data-lucide="menu" class="w-8 h-8"></i>
  </button>

  <nav class="nav-overlay" id="nav">
    <a href="#hero" class="text-4xl font-bold">HOME</a>
    <a href="#work" class="text-4xl font-bold">SOLUTIONS</a>
    <a href="#pricing" class="text-4xl font-bold">INVESTMENTS</a>
    <a href="#contact" class="text-4xl font-bold">CONNECT</a>
  </nav>

  <div class="section-container" id="container">
    <section class="section" id="hero">
      <div class="video-bg"><canvas id="heroCanvas"></canvas></div>
      <div class="text-center z-10">
        <h1 class="reveal font-extrabold leading-none" style="font-size: clamp(4rem, 15vw, 10rem);">CODE101</h1>
        <p class="reveal mt-4 opacity-60 font-mono">MINIMALIST DESIGN SOLUTIONS</p>
      </div>
    </section>

    <section class="section" id="work">
      <div class="w-full max-w-6xl">
        <h2 class="text-4xl font-bold mb-8 reveal">SOLUTIONS</h2>
        <div class="responsive-grid">
          <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-800 reveal">
            <h3 class="text-xl font-bold">Web Design</h3>
            <p class="text-sm opacity-50 mt-2">Minimalist & Monochromatic</p>
          </div>
          <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-800 reveal">
            <h3 class="text-xl font-bold">UI/UX</h3>
            <p class="text-sm opacity-50 mt-2">Interactive Experiences</p>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    // Lucide Icons
    lucide.createIcons();

    // Custom Cursor Logic
    const cursor = document.getElementById('cursor');
    const dot = document.getElementById('dot');
    
    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      dot.style.left = e.clientX + 'px';
      dot.style.top = e.clientY + 'px';
    });

    // Mobile Menu
    const menuBtn = document.getElementById('menuBtn');
    const nav = document.getElementById('nav');
    menuBtn.onclick = () => nav.classList.toggle('active');
    nav.onclick = () => nav.classList.remove('active');

    // Scroll Observer
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
 </body>
</html>
